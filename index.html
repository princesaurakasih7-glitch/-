<!DOCTYPE html>
<html>
<head>
<title>Gesture 3D Particle System</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#050505;
    font-family:Arial;
}

#ui{
    position:absolute;
    top:20px;
    left:20px;
    background:rgba(0,0,0,.55);
    padding:15px;
    border-radius:15px;
    color:white;
    z-index:10;
}

button,select,input{
    margin:5px;
    padding:8px;
    border-radius:8px;
    border:none;
}

canvas{
    display:block;
}
</style>

</head>

<body>

<div id="ui">

<h3>Particle Control</h3>

<select id="pattern">
<option value="sphere">Sphere</option>
<option value="heart">Heart</option>
<option value="galaxy">Galaxy</option>
<option value="ring">Ring</option>
</select>

<br>

<input type="color" id="color" value="#ff0088">

<br>

<button onclick="fullscreen()">Fullscreen</button>

</div>


<video id="video" autoplay playsinline style="display:none"></video>


<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>


<script>

let scene,camera,renderer;
let particles;
let target=[];
let amount=7000;

let gesture=1;



init();
createParticles("sphere");


function init(){

scene=new THREE.Scene();

camera=new THREE.PerspectiveCamera(
70,
innerWidth/innerHeight,
0.1,
1000
);

camera.position.z=6;


renderer=new THREE.WebGLRenderer({
antialias:true
});

renderer.setSize(
innerWidth,
innerHeight
);

document.body.appendChild(renderer.domElement);


window.addEventListener(
"resize",
()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
}
);


animate();

}



function createParticles(type){

if(particles)
scene.remove(particles);


let geo=new THREE.BufferGeometry();

let pos=[];


for(let i=0;i<amount;i++){

let x,y,z;


if(type==="sphere"){

let r=2;

let t=Math.random()*Math.PI*2;
let p=Math.acos(
2*Math.random()-1
);

x=r*Math.sin(p)*Math.cos(t);
y=r*Math.sin(p)*Math.sin(t);
z=r*Math.cos(p);

}


if(type==="heart"){

let t=Math.random()*Math.PI*2;

x=0.16*Math.pow(Math.sin(t),3)*3;
y=(0.13*Math.cos(t)
-0.05*Math.cos(2*t)
-0.02*Math.cos(3*t)
-0.01*Math.cos(4*t))*3;

z=(Math.random()-.5);

}


if(type==="galaxy"){

let a=Math.random()*20;

x=Math.cos(a)*a/8;
y=(Math.random()-.5);
z=Math.sin(a)*a/8;

}


if(type==="ring"){

let a=Math.random()*Math.PI*2;

x=Math.cos(a)*2;
y=(Math.random()-.5)*.3;
z=Math.sin(a)*2;

}


pos.push(x,y,z);

}


geo.setAttribute(
"position",
new THREE.Float32BufferAttribute(pos,3)
);


let mat=new THREE.PointsMaterial({

size:.035,

color:
document.getElementById("color").value,

transparent:true,

opacity:.9

});


particles=new THREE.Points(
geo,
mat
);

scene.add(particles);

}


document
.getElementById("pattern")
.onchange=e=>{

createParticles(e.target.value);

};



document
.getElementById("color")
.oninput=e=>{

particles.material.color.set(e.target.value);

};




// HAND TRACKING


const video=document.getElementById("video");


const hands=new Hands({

locateFile:file=>
`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`

});


hands.setOptions({

maxNumHands:1,

minDetectionConfidence:.7,

minTrackingConfidence:.7

});


hands.onResults(results=>{


if(results.multiHandLandmarks.length){


let lm=
results.multiHandLandmarks[0];


let thumb=lm[4];
let finger=lm[8];


let distance=Math.hypot(
thumb.x-finger.x,
thumb.y-finger.y
);


// open hand
if(distance>.18){

gesture=2;

}
// closed
else{

gesture=.5;

}

}

});



const cam=new Camera(video,{

onFrame:async()=>{

await hands.send({
image:video
});

},

width:640,
height:480

});


cam.start();




// animation

function animate(){

requestAnimationFrame(animate);


let arr=
particles.geometry.attributes.position.array;


for(let i=0;i<arr.length;i+=3){

arr[i]*=.98+gesture*.01;
arr[i+1]*=.98+gesture*.01;
arr[i+2]*=.98+gesture*.01;


if(gesture>1.5){

arr[i]+=(Math.random()-.5)*.02;
arr[i+1]+=(Math.random()-.5)*.02;
arr[i+2]+=(Math.random()-.5)*.02;

}

}


particles.geometry.attributes.position.needsUpdate=true;


renderer.render(
scene,
camera
);

}



function fullscreen(){

document.documentElement.requestFullscreen();

}


</script>

</body>
</html>
